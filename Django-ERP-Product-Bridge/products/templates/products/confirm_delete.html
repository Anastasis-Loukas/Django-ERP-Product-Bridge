{% extends "base.html" %}

{% block content %}

<h2>Confirm Delete</h2>

<p>Are you sure you want to delete product with barcode:"{{ product.barcode }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>
<a href="{% url 'products:list' %}">Cancel</a>

{% endblock %}
